<svg width="200" height="260" viewBox="0 0 200 260" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="eggGlow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#3A506B" stop-opacity="0.6" />
      <stop offset="70%" stop-color="#0B132B" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#0B132B" stop-opacity="0" />
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Outer Glow -->
  <ellipse cx="100" cy="130" rx="90" ry="120" fill="url(#eggGlow)" />
  
  <!-- The Cosmic Egg / Black Hole -->
  <path d="M100 20C60 20 30 70 30 130C30 190 60 240 100 240C140 240 170 190 170 130C170 70 140 20 100 20Z" fill="#02050A" stroke="#1C2541" stroke-width="0.5" />
  
  <!-- The Luminous Crack / Singularity -->
  <path d="M100 60 Q105 130 100 200 M98 100 Q100 130 102 160" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" filter="url(#glow)" opacity="0.8">
    <animate attributeName="opacity" values="0.4;0.9;0.4" dur="5s" repeatCount="indefinite" />
  </path>
  
  <!-- Subtle Dust / Particles -->
  <circle cx="70" cy="80" r="0.5" fill="#FFFFFF" opacity="0.5" />
  <circle cx="130" cy="180" r="0.5" fill="#FFFFFF" opacity="0.3" />
  <circle cx="150" cy="100" r="0.8" fill="#5BC0BE" opacity="0.4" />
</svg>